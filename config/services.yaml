services:
    _defaults:
        autowire: true
        autoconfigure: true
        public: false

    # --- Configuration Provider ---

    Abderrahim\SyliusLoyaltyPlugin\Service\LoyaltyConfigurationProvider:
        arguments:
            $entityManager: '@doctrine.orm.entity_manager'

    Abderrahim\SyliusLoyaltyPlugin\Service\LoyaltyConfigurationProviderInterface:
        alias: Abderrahim\SyliusLoyaltyPlugin\Service\LoyaltyConfigurationProvider

    # --- Services ---

    Abderrahim\SyliusLoyaltyPlugin\Service\PointsCalculator:
        arguments:
            $configProvider: '@Abderrahim\SyliusLoyaltyPlugin\Service\LoyaltyConfigurationProviderInterface'

    Abderrahim\SyliusLoyaltyPlugin\Service\PointsCalculatorInterface:
        alias: Abderrahim\SyliusLoyaltyPlugin\Service\PointsCalculator

    Abderrahim\SyliusLoyaltyPlugin\Service\TierEvaluator:
        arguments:
            $tierRepository: '@loyalty.repository.tier'
            $configProvider: '@Abderrahim\SyliusLoyaltyPlugin\Service\LoyaltyConfigurationProviderInterface'

    Abderrahim\SyliusLoyaltyPlugin\Service\TierEvaluatorInterface:
        alias: Abderrahim\SyliusLoyaltyPlugin\Service\TierEvaluator

    Abderrahim\SyliusLoyaltyPlugin\Service\LoyaltyBalanceManager:
        arguments:
            $accountRepository: '@loyalty.repository.account'
            $transactionRepository: '@loyalty.repository.point_transaction'
            $accountFactory: '@loyalty.factory.account'
            $entityManager: '@doctrine.orm.entity_manager'
            $pointsCalculator: '@Abderrahim\SyliusLoyaltyPlugin\Service\PointsCalculatorInterface'
            $tierEvaluator: '@Abderrahim\SyliusLoyaltyPlugin\Service\TierEvaluatorInterface'
            $configProvider: '@Abderrahim\SyliusLoyaltyPlugin\Service\LoyaltyConfigurationProviderInterface'

    Abderrahim\SyliusLoyaltyPlugin\Service\LoyaltyBalanceManagerInterface:
        alias: Abderrahim\SyliusLoyaltyPlugin\Service\LoyaltyBalanceManager

    # --- Event Listeners ---

    Abderrahim\SyliusLoyaltyPlugin\EventListener\OrderCompleteListener:
        arguments:
            $balanceManager: '@Abderrahim\SyliusLoyaltyPlugin\Service\LoyaltyBalanceManagerInterface'
        tags:
            - { name: kernel.event_listener, event: sylius.order.post_complete, method: __invoke }

    Abderrahim\SyliusLoyaltyPlugin\EventListener\OrderCancelListener:
        arguments:
            $balanceManager: '@Abderrahim\SyliusLoyaltyPlugin\Service\LoyaltyBalanceManagerInterface'
        tags:
            - { name: kernel.event_listener, event: sylius.order.post_cancel, method: __invoke }

    Abderrahim\SyliusLoyaltyPlugin\EventListener\CustomerRegistrationListener:
        arguments:
            $balanceManager: '@Abderrahim\SyliusLoyaltyPlugin\Service\LoyaltyBalanceManagerInterface'
            $configProvider: '@Abderrahim\SyliusLoyaltyPlugin\Service\LoyaltyConfigurationProviderInterface'
        tags:
            - { name: kernel.event_listener, event: sylius.customer.post_register, method: __invoke }

    # --- Commands ---

    Abderrahim\SyliusLoyaltyPlugin\Command\ExpirePointsCommand:
        arguments:
            $transactionRepository: '@loyalty.repository.point_transaction'
            $balanceManager: '@Abderrahim\SyliusLoyaltyPlugin\Service\LoyaltyBalanceManagerInterface'
        tags:
            - { name: console.command }

    Abderrahim\SyliusLoyaltyPlugin\Command\BirthdayBonusCommand:
        arguments:
            $customerRepository: '@sylius.repository.customer'
            $balanceManager: '@Abderrahim\SyliusLoyaltyPlugin\Service\LoyaltyBalanceManagerInterface'
            $entityManager: '@doctrine.orm.entity_manager'
            $configProvider: '@Abderrahim\SyliusLoyaltyPlugin\Service\LoyaltyConfigurationProviderInterface'
        tags:
            - { name: console.command }

    # --- Order Processing ---

    Abderrahim\SyliusLoyaltyPlugin\OrderProcessing\LoyaltyOrderProcessor:
        arguments:
            $accountRepository: '@loyalty.repository.account'
            $adjustmentFactory: '@sylius.factory.adjustment'
            $configProvider: '@Abderrahim\SyliusLoyaltyPlugin\Service\LoyaltyConfigurationProviderInterface'
        tags:
            - { name: sylius.order_processor, priority: 5 }

    # --- API Controllers ---

    Abderrahim\SyliusLoyaltyPlugin\Controller\Api\LoyaltyRedemptionController:
        arguments:
            $orderRepository: '@sylius.repository.order'
            $loyaltyAccountRepository: '@loyalty.repository.account'
            $orderProcessor: '@sylius.order_processing.order_processor'
            $configProvider: '@Abderrahim\SyliusLoyaltyPlugin\Service\LoyaltyConfigurationProviderInterface'
            $entityManager: '@doctrine.orm.entity_manager'
        tags:
            - { name: controller.service_arguments }

    # --- Workflow Listeners ---

    Abderrahim\SyliusLoyaltyPlugin\EventListener\Workflow\DeductPointsOnOrderCompleteListener:
        arguments:
            $balanceManager: '@Abderrahim\SyliusLoyaltyPlugin\Service\LoyaltyBalanceManagerInterface'

    Abderrahim\SyliusLoyaltyPlugin\EventListener\Workflow\RestorePointsOnOrderCancelListener:
        arguments:
            $accountRepository: '@loyalty.repository.account'
            $transactionRepository: '@loyalty.repository.point_transaction'
            $balanceManager: '@Abderrahim\SyliusLoyaltyPlugin\Service\LoyaltyBalanceManagerInterface'

    Abderrahim\SyliusLoyaltyPlugin\EventListener\Workflow\RestorePointsOnPaymentRefundListener:
        arguments:
            $accountRepository: '@loyalty.repository.account'
            $transactionRepository: '@loyalty.repository.point_transaction'
            $balanceManager: '@Abderrahim\SyliusLoyaltyPlugin\Service\LoyaltyBalanceManagerInterface'

    # --- Admin Controllers ---

    Abderrahim\SyliusLoyaltyPlugin\Controller\Admin\LoyaltyAccountController:
        arguments:
            $accountRepository: '@loyalty.repository.account'
            $transactionRepository: '@loyalty.repository.point_transaction'
        tags:
            - { name: controller.service_arguments }

    Abderrahim\SyliusLoyaltyPlugin\Controller\Admin\LoyaltyConfigurationController:
        arguments:
            $configProvider: '@Abderrahim\SyliusLoyaltyPlugin\Service\LoyaltyConfigurationProviderInterface'
            $entityManager: '@doctrine.orm.entity_manager'
        tags:
            - { name: controller.service_arguments }

    Abderrahim\SyliusLoyaltyPlugin\Controller\Admin\PointAdjustmentController:
        arguments:
            $accountRepository: '@loyalty.repository.account'
            $balanceManager: '@Abderrahim\SyliusLoyaltyPlugin\Service\LoyaltyBalanceManagerInterface'
        tags:
            - { name: controller.service_arguments }

    # --- Shop Controllers ---

    Abderrahim\SyliusLoyaltyPlugin\Controller\Shop\LoyaltyAccountController:
        arguments:
            $customerContext: '@sylius.context.customer'
            $balanceManager: '@Abderrahim\SyliusLoyaltyPlugin\Service\LoyaltyBalanceManagerInterface'
            $transactionRepository: '@loyalty.repository.point_transaction'
            $configProvider: '@Abderrahim\SyliusLoyaltyPlugin\Service\LoyaltyConfigurationProviderInterface'
        tags:
            - { name: controller.service_arguments }

    # --- Menu Listener ---

    Abderrahim\SyliusLoyaltyPlugin\Menu\AdminMenuListener:
        tags:
            - { name: kernel.event_listener, event: sylius.menu.admin.main, method: addLoyaltyMenu }

    Abderrahim\SyliusLoyaltyPlugin\Menu\ShopAccountMenuListener:
        tags:
            - { name: kernel.event_listener, event: sylius.menu.shop.account, method: addLoyaltyMenu }

    # --- Form Types ---

    Abderrahim\SyliusLoyaltyPlugin\Form\Type\LoyaltyConfigurationType:
        tags:
            - { name: form.type }

    Abderrahim\SyliusLoyaltyPlugin\Form\Type\PointAdjustmentType:
        tags:
            - { name: form.type }

    Abderrahim\SyliusLoyaltyPlugin\Form\Type\LoyaltyTierType:
        tags:
            - { name: form.type }

    # --- Twig Extension ---

    Abderrahim\SyliusLoyaltyPlugin\Twig\LoyaltyExtension:
        arguments:
            $accountRepository: '@loyalty.repository.account'
            $configProvider: '@Abderrahim\SyliusLoyaltyPlugin\Service\LoyaltyConfigurationProviderInterface'
        tags:
            - { name: twig.extension }
