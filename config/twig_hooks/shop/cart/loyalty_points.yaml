        'sylius_shop.shared.order.show.summary.table_summary':
            loyalty_discount:
                template: '@SyliusLoyaltyPlugin/shop/shared/order/show/summary/table_summary/loyalty_discount.html.twig'
                priority: 250

        'sylius_shop.shared.order.show.summary.table_summary.loyalty_discount':
